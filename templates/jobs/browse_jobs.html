<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureHire AI — Browse Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0E1A2B;
    --surface: #152238;
    --surface-light: #1B2A45;
    --border: #22314A;
    --text: #EAEDF2;
    --muted: #8B96A8;
    --gold: #D4A24E;
    --teal: #4FA490;
    --error: #E0685A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    color: var(--text);
    min-height: 100vh;
    padding: 56px 24px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .filters input, .filters select {
    background: var(--ink);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .filters input { flex: 1; min-width: 180px; }
  .filters input:focus, .filters select:focus { border-color: var(--teal); }
  .filters .clear-btn {
    background: var(--surface-light);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    cursor: pointer;
  }
  .results-count {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
  }
  .job-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 16px;
  }
  .job-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  .job-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .job-company { color: var(--gold); font-size: 14px; font-weight: 500; }
  .job-type-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: rgba(79, 164, 144, 0.12);
    color: var(--teal);
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .job-meta { color: var(--muted); font-size: 13px; margin: 10px 0 12px; }
  .job-desc { color: var(--text); font-size: 14px; line-height: 1.6; margin-bottom: 14px; }
  .job-skills { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  .job-skills span { color: var(--teal); }
  .apply-btn {
    background: var(--gold);
    color: #0E1A2B;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .apply-btn:hover { filter: brightness(1.08); }
  .apply-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .apply-btn.applied { background: var(--surface-light); color: var(--teal); border: 1px solid var(--teal); }
  .apply-form {
    display: none;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .apply-form.open { display: block; }
  .apply-form textarea {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 70px;
    resize: vertical;
    margin-bottom: 10px;
    outline: none;
  }
  .apply-form textarea:focus { border-color: var(--teal); }
  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .file-label {
    background: var(--surface-light);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .file-name { color: var(--muted); font-size: 12px; }
  .form-buttons { display: flex; gap: 8px; }
  .cancel-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .empty, .loading {
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-size: 14px;
  }
  .notice {
    background: rgba(224, 104, 90, 0.1);
    border: 1px solid var(--error);
    color: #F0A99E;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 24px;
    display: none;
  }
  .notice a { color: var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Job board</div>
  <h1>Open roles</h1>
  <p class="subtitle">Apply directly — recruiters get notified instantly.</p>

  <div class="notice" id="loginNotice">
    You're not logged in as a candidate. <a href="/api/accounts/login-page/">Log in</a> to apply.
  </div>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="Search by title, skill, or company...">
    <input type="text" id="locationInput" placeholder="Location">
    <select id="jobTypeInput">
      <option value="">All job types</option>
      <option value="full_time">Full-time</option>
      <option value="part_time">Part-time</option>
      <option value="internship">Internship</option>
      <option value="contract">Contract</option>
    </select>
    <button class="clear-btn" onclick="clearFilters()">Clear</button>
  </div>

  <div class="results-count" id="resultsCount"></div>

  <div id="jobsContainer">
    <div class="loading">Loading jobs...</div>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  const container = document.getElementById('jobsContainer');
  const resultsCount = document.getElementById('resultsCount');
  let debounceTimer;
  let jobsData = [];

  if (!token) {
    document.getElementById('loginNotice').style.display = 'block';
  }

  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadJobs, 400);
  });
  document.getElementById('locationInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadJobs, 400);
  });
  document.getElementById('jobTypeInput').addEventListener('change', loadJobs);

  function clearFilters() {
    document.getElementById('searchInput').value = '';
    document.getElementById('locationInput').value = '';
    document.getElementById('jobTypeInput').value = '';
    loadJobs();
  }

  async function loadJobs() {
    const search = document.getElementById('searchInput').value.trim();
    const location = document.getElementById('locationInput').value.trim();
    const jobType = document.getElementById('jobTypeInput').value;

    const params = new URLSearchParams();
    if (search) params.append('search', search);
    if (location) params.append('location', location);
    if (jobType) params.append('job_type', jobType);

    try {
      const res = await fetch('/api/jobs/list/?' + params.toString());
      const jobs = await res.json();
      jobsData = jobs;

      resultsCount.textContent = jobs.length + (jobs.length === 1 ? ' role found' : ' roles found');

      if (!jobs.length) {
        container.innerHTML = '<div class="empty">No roles match your search. Try different keywords.</div>';
        return;
      }

      container.innerHTML = jobs.map(job => `
        <div class="job-card">
          <div class="job-top">
            <div>
              <div class="job-title">${job.title}</div>
              <div class="job-company">${job.company_name}</div>
            </div>
            <div class="job-type-tag">${job.job_type.replace('_', ' ')}</div>
          </div>
          <div class="job-meta">${job.location}${job.salary_min && job.salary_max ? ' Rs.' + job.salary_min + ' to Rs.' + job.salary_max : job.salary_min ? ' From Rs.' + job.salary_min : ''}</div>
          <div class="job-desc">${job.description}</div>
          <div class="job-skills">Skills: <span>${job.skills_required}</span></div>
          <button class="apply-btn" id="btn-${job.id}" onclick="toggleApplyForm(${job.id})">Apply now</button>

          <div class="apply-form" id="form-${job.id}">
            <textarea id="cover-${job.id}" placeholder="Optional: write a short note to the recruiter..."></textarea>
            <div class="file-row">
              <label class="file-label" for="resume-${job.id}">Choose resume (PDF)</label>
              <input type="file" id="resume-${job.id}" accept=".pdf" style="display:none" onchange="updateFileName(${job.id})">
              <span class="file-name" id="filename-${job.id}">No file selected</span>
            </div>
            <div class="form-buttons">
              <button class="apply-btn" onclick="submitApplication(${job.id})">Submit application</button>
              <button class="cancel-btn" onclick="toggleApplyForm(${job.id})">Cancel</button>
            </div>
          </div>
        </div>
      `).join('');
    } catch (err) {
      container.innerHTML = '<div class="empty">Could not load jobs. Try refreshing.</div>';
    }
  }

  function toggleApplyForm(jobId) {
    if (!token) {
      window.location.href = '/api/accounts/login-page/';
      return;
    }
    document.getElementById('form-' + jobId).classList.toggle('open');
  }

  function updateFileName(jobId) {
    const fileInput = document.getElementById('resume-' + jobId);
    const label = document.getElementById('filename-' + jobId);
    label.textContent = fileInput.files.length ? fileInput.files[0].name : 'No file selected';
  }

  async function submitApplication(jobId) {
    const btn = document.getElementById('btn-' + jobId);
    const coverLetter = document.getElementById('cover-' + jobId).value;
    const resumeFile = document.getElementById('resume-' + jobId).files[0];

    const formData = new FormData();
    formData.append('job', jobId);
    formData.append('cover_letter', coverLetter);
    if (resumeFile) {
      formData.append('resume', resumeFile);
    }

    btn.disabled = true;
    btn.textContent = 'Applying...';

    try {
      const res = await fetch('/api/applications/apply/', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
        },
        body: formData,
      });

      const data = await res.json();

      if (res.ok) {
        btn.textContent = 'Applied';
        btn.classList.add('applied');
        document.getElementById('form-' + jobId).classList.remove('open');
      } else {
        btn.disabled = false;
        btn.textContent = 'Apply now';
        alert(data.detail || Object.values(data).flat().join(' '));
      }
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Apply now';
      alert('Something went wrong. Try again.');
    }
  }

  loadJobs();
</script>
</body>
</html>
