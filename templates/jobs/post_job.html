<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecureHire AI — Post a Job</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0E1A2B;
    --surface: #152238;
    --surface-light: #1B2A45;
    --border: #22314A;
    --text: #EAEDF2;
    --muted: #8B96A8;
    --gold: #D4A24E;
    --teal: #4FA490;
    --error: #E0685A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    color: var(--text);
    min-height: 100vh;
    padding: 56px 24px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
  }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .field textarea { min-height: 100px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--teal); }
  .field input::placeholder, .field textarea::placeholder { color: #57647A; }
  .submit-btn {
    width: 100%;
    background: var(--gold);
    color: #0E1A2B;
    border: none;
    border-radius: 8px;
    padding: 14px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
  .submit-btn:hover { filter: brightness(1.08); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .message {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .message.error {
    display: block;
    background: rgba(224, 104, 90, 0.1);
    border: 1px solid var(--error);
    color: #F0A99E;
  }
  .message.success {
    display: block;
    background: rgba(79, 164, 144, 0.1);
    border: 1px solid var(--teal);
    color: #8FCFC0;
  }
  .blocked {
    text-align: center;
    padding: 60px 24px;
    background: var(--surface);
    border: 1px solid var(--error);
    border-radius: 12px;
    display: none;
  }
  .blocked h2 { font-family: 'Fraunces', serif; margin-bottom: 10px; }
  .blocked p { color: var(--muted); font-size: 14px; }
  .blocked a { color: var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Recruiter tools</div>
  <h1>Post a new job</h1>
  <p class="subtitle">This listing goes live immediately for candidates to see.</p>

  <div class="card" id="formCard">
    <form id="jobForm">
      <div class="field">
        <label for="title">Job title</label>
        <input type="text" id="title" placeholder="e.g. Backend Developer Intern" required>
      </div>
      <div class="row">
        <div class="field">
          <label for="company">Company name</label>
          <input type="text" id="company" placeholder="e.g. SecureHire Technologies" required>
        </div>
        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location" placeholder="e.g. Remote / Delhi" required>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="jobType">Job type</label>
          <select id="jobType">
            <option value="full_time">Full-time</option>
            <option value="part_time">Part-time</option>
            <option value="internship">Internship</option>
            <option value="contract">Contract</option>
          </select>
        </div>
        <div class="field">
          <label for="skills">Skills required</label>
          <input type="text" id="skills" placeholder="Python, Django, SQL">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="salaryMin">Salary min (optional)</label>
          <input type="number" id="salaryMin" placeholder="e.g. 30000">
        </div>
        <div class="field">
          <label for="salaryMax">Salary max (optional)</label>
          <input type="number" id="salaryMax" placeholder="e.g. 50000">
        </div>
      </div>
      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Describe the role, responsibilities, requirements..." required></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Post job</button>
      <div class="message" id="message"></div>
    </form>
  </div>

  <div class="blocked" id="blockedBox">
    <h2 id="blockedTitle"></h2>
    <p id="blockedText"></p>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');

  if (!token) {
    document.getElementById('formCard').style.display = 'none';
    document.getElementById('blockedBox').style.display = 'block';
    document.getElementById('blockedTitle').textContent = "You're not logged in";
    document.getElementById('blockedText').innerHTML = 'Please <a href="/api/accounts/login-page/">log in</a> as a recruiter to post a job.';
  }

  document.getElementById('jobForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('message');
    btn.disabled = true;
    btn.textContent = 'Posting...';
    msg.className = 'message';

    const payload = {
      title: document.getElementById('title').value,
      company_name: document.getElementById('company').value,
      location: document.getElementById('location').value,
      job_type: document.getElementById('jobType').value,
      skills_required: document.getElementById('skills').value,
      salary_min: document.getElementById('salaryMin').value || null,
      salary_max: document.getElementById('salaryMax').value || null,
      description: document.getElementById('description').value,
    };

    try {
      const res = await fetch('/api/jobs/create/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
        },
        body: JSON.stringify(payload),
      });

      const data = await res.json();

      if (res.ok) {
        msg.className = 'message success';
        msg.textContent = `"${data.title}" was posted successfully.`;
        document.getElementById('jobForm').reset();
        btn.textContent = 'Post job';
        btn.disabled = false;
      } else {
        msg.className = 'message error';
        msg.textContent = data.detail || Object.values(data).flat().join(' ');
        btn.disabled = false;
        btn.textContent = 'Post job';
      }
    } catch (err) {
      msg.className = 'message error';
      msg.textContent = 'Something went wrong. Try again.';
      btn.disabled = false;
      btn.textContent = 'Post job';
    }
  });
</script>
</body>
</html>
